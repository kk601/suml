version: '3.8'

services:
  train:
    profiles: [train]
    build:
      context: .
      dockerfile: model/Dockerfile
    volumes:
      - ./data:/app/data

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/data

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend